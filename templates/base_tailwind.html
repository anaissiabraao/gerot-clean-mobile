<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1B2B4D">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>{% block title %}GeRot - Gestão de Rotinas | PORTOEX{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Sistema de gestão de rotinas empresariais PORTOEX. Gerencie tarefas, equipes e relatórios de forma eficiente.{% endblock %}">
    <meta name="author" content="PORTOEX">

    <!-- Built Tailwind CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    {% block head %}{% endblock %}
</head>
<body class="bg-background text-foreground antialiased">
    {% block header %}
    {% if session.user_id %}
    {% block header_prepend %}{% endblock %}
    {% include "partials/header_tailwind.html" %}
    {% endif %}
    {% endblock %}

    {% block content %}{% endblock %}

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
