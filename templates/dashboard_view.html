{% extends "base_tailwind.html" %}

{% block title %}{{ template.title }} - GeRot{% endblock %}

{% block content %}
<div class="min-h-screen bg-background">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b bg-card/95 backdrop-blur supports-[backdrop-filter]:bg-card/60">
        <div class="container mx-auto flex h-14 items-center justify-between px-4">
            <div class="flex items-center gap-3">
                <a href="{{ url_for('agent_page') }}" class="btn btn-ghost p-2 rounded-lg">
                    <i class="fas fa-arrow-left text-sm"></i>
                </a>
                <div class="border-l border-border pl-3">
                    <h1 class="text-sm font-semibold text-foreground leading-none">{{ template.title }}</h1>
                    <span class="text-[11px] text-muted-foreground">{{ template.category }}</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="refreshData()" class="btn btn-ghost text-xs gap-1.5 px-2.5 py-1.5" id="refreshBtn">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i>
                    <span class="hidden sm:inline">Atualizar</span>
                </button>
                <a href="{{ url_for('dashboard_editor', template_id=template.id) }}" 
                   class="btn btn-outline text-xs gap-1.5 px-2.5 py-1.5">
                    <i class="fas fa-edit"></i>
                    <span class="hidden sm:inline">Editar</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Dashboard Canvas -->
    <main class="container mx-auto px-4 py-5">
        <!-- Loading skeleton -->
        <div id="dashboardSkeleton" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-12 gap-4">
            <div class="sm:col-span-1 xl:col-span-3 card-base p-5 animate-pulse">
                <div class="h-3 w-20 bg-muted rounded mb-3"></div>
                <div class="h-8 w-24 bg-muted rounded"></div>
            </div>
            <div class="sm:col-span-1 xl:col-span-3 card-base p-5 animate-pulse">
                <div class="h-3 w-20 bg-muted rounded mb-3"></div>
                <div class="h-8 w-24 bg-muted rounded"></div>
            </div>
            <div class="sm:col-span-2 xl:col-span-6 card-base p-5 animate-pulse">
                <div class="h-3 w-32 bg-muted rounded mb-3"></div>
                <div class="h-40 bg-muted rounded"></div>
            </div>
        </div>
        <div id="dashboardCanvas" class="hidden grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-12 gap-4 auto-rows-min">
            <!-- Componentes serão renderizados aqui -->
        </div>
    </main>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const templateConfig = {
    id: {{ template.id }},
    queryConfig: {{ template.query_config | tojson if template.query_config else '{}' }},
    chartsConfig: {{ template.charts_config | tojson if template.charts_config else '[]' }}
};

let dashboardData = [];
let chartInstances = {};

document.addEventListener('DOMContentLoaded', async () => {
    await loadData();
    renderDashboard();
});

async function loadData() {
    const query = templateConfig.queryConfig.query;
    if (!query) return;
    
    try {
        const response = await fetch('/api/agent/dashboard-editor/execute-query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query })
        });
        
        const result = await response.json();
        if (result.data) {
            dashboardData = result.data;
        }
    } catch (error) {
        console.error('Erro ao carregar dados:', error);
    }
}

function renderDashboard() {
    const skeleton = document.getElementById('dashboardSkeleton');
    const canvas = document.getElementById('dashboardCanvas');
    skeleton.classList.add('hidden');
    canvas.classList.remove('hidden');
    canvas.innerHTML = '';
    
    if (templateConfig.chartsConfig.length === 0) {
        canvas.innerHTML = `
            <div class="col-span-full text-center py-16">
                <div class="mx-auto w-14 h-14 rounded-full bg-muted flex items-center justify-center mb-4">
                    <i class="fas fa-chart-bar text-xl text-muted-foreground"></i>
                </div>
                <p class="text-sm text-muted-foreground">Este dashboard não possui componentes configurados</p>
                <a href="${'{{ url_for("dashboard_editor", template_id=template.id) }}'}" class="btn btn-outline text-xs mt-3 gap-1.5">
                    <i class="fas fa-plus"></i>Adicionar componente
                </a>
            </div>
        `;
        return;
    }
    
    templateConfig.chartsConfig.forEach(config => {
        renderComponent(config);
    });
}

function renderComponent(config) {
    const canvas = document.getElementById('dashboardCanvas');
    
    // Responsivo: KPI ocupa menos espaço, gráficos se adaptam
    const colSpan = config.colSpan || 6;
    const wrapper = document.createElement('div');
    wrapper.className = `col-span-1 sm:col-span-1 xl:col-span-${colSpan} card-base overflow-hidden`;
    
    const isKPI = config.type === 'kpi';
    
    wrapper.innerHTML = `
        <div class="flex items-center justify-between px-4 py-2.5 border-b bg-muted/20">
            <span class="text-xs font-medium text-muted-foreground uppercase tracking-wide">${config.title}</span>
            <span class="badge badge-muted text-[10px]">${config.type}</span>
        </div>
        <div class="${isKPI ? 'p-5' : 'p-4'}" id="content_${config.id}" style="${isKPI ? '' : 'height:280px;'}">
            ${config.type === 'table' ? '<div id="table_' + config.id + '" class="h-full overflow-auto"></div>' : 
              config.type === 'kpi' ? '<div id="kpi_' + config.id + '"></div>' :
              '<canvas id="canvas_' + config.id + '"></canvas>'}
        </div>
    `;
    
    canvas.appendChild(wrapper);
    
    setTimeout(() => {
        if (config.type === 'table') renderTable(config);
        else if (config.type === 'kpi') renderKPI(config);
        else renderChart(config);
    }, 100);
}

function renderChart(config) {
    const ctx = document.getElementById(`canvas_${config.id}`);
    if (!ctx || !dashboardData.length) return;
    
    const aggregated = aggregateData(config);
    const brandColors = [
        'hsl(19, 79%, 56%)',   // primary orange
        'hsl(220, 47%, 20%)',  // navy
        'hsl(142, 71%, 45%)',  // success
        'hsl(38, 92%, 50%)',   // warning
        'hsl(217, 91%, 60%)',  // info
        'hsl(0, 84%, 60%)',    // destructive
        'hsl(19, 79%, 72%)',   // orange light
        'hsl(220, 47%, 35%)',  // navy light
    ];
    
    const chartConfig = {
        type: config.type === 'doughnut' ? 'doughnut' : config.type,
        data: {
            labels: aggregated.labels,
            datasets: [{
                label: config.title,
                data: aggregated.values,
                backgroundColor: config.colors || brandColors.map(c => c.replace(')', ' / 0.75)')),
                borderColor: config.colors || brandColors,
                borderWidth: 1,
                borderRadius: config.type === 'bar' ? 4 : 0,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: ['pie', 'doughnut'].includes(config.type),
                    position: 'bottom',
                    labels: { padding: 16, usePointStyle: true, pointStyleWidth: 8, font: { size: 11 } }
                }
            },
            scales: !['pie', 'doughnut'].includes(config.type) ? {
                x: { grid: { display: false }, ticks: { font: { size: 11 } } },
                y: { grid: { color: 'hsl(220, 13%, 91%, 0.5)' }, ticks: { font: { size: 11 } } }
            } : undefined
        }
    };
    
    chartInstances[config.id] = new Chart(ctx, chartConfig);
}

function aggregateData(config) {
    const fields = dashboardData.length > 0 ? Object.keys(dashboardData[0]) : [];
    const xField = config.xField || fields[0];
    const yField = config.yField;
    
    const groups = {};
    dashboardData.forEach(row => {
        const key = row[xField] || 'N/A';
        if (!groups[key]) groups[key] = [];
        groups[key].push(yField ? parseFloat(row[yField]) || 0 : 1);
    });
    
    const labels = Object.keys(groups).slice(0, 10);
    const values = labels.map(key => {
        const arr = groups[key];
        switch (config.aggregation) {
            case 'sum': return arr.reduce((a, b) => a + b, 0);
            case 'avg': return arr.reduce((a, b) => a + b, 0) / arr.length;
            case 'min': return Math.min(...arr);
            case 'max': return Math.max(...arr);
            default: return arr.length;
        }
    });
    
    return { labels, values };
}

function renderTable(config) {
    const container = document.getElementById(`table_${config.id}`);
    if (!container || !dashboardData.length) return;
    
    const fields = Object.keys(dashboardData[0]).slice(0, 6);
    const rows = dashboardData.slice(0, 20);
    
    container.innerHTML = `
        <div class="overflow-x-auto -mx-4">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b bg-muted/30">
                        ${fields.map(f => `<th class="px-4 py-2 text-left text-[11px] font-semibold text-muted-foreground uppercase tracking-wider">${f}</th>`).join('')}
                    </tr>
                </thead>
                <tbody class="divide-y divide-border">
                    ${rows.map(row => `
                        <tr class="hover:bg-muted/20 transition-colors">
                            ${fields.map(f => `<td class="px-4 py-2.5 text-sm whitespace-nowrap text-foreground">${row[f] || '<span class="text-muted-foreground/50">—</span>'}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
        ${dashboardData.length > 20 ? `<p class="text-[11px] text-muted-foreground text-center mt-3 pb-1">Mostrando 20 de ${dashboardData.length} registros</p>` : ''}
    `;
}

function renderKPI(config) {
    const container = document.getElementById(`kpi_${config.id}`);
    if (!container) return;
    
    let value = dashboardData.length;
    if (config.yField && dashboardData.length > 0) {
        const values = dashboardData.map(r => parseFloat(r[config.yField]) || 0);
        switch (config.aggregation) {
            case 'sum': value = values.reduce((a, b) => a + b, 0); break;
            case 'avg': value = values.reduce((a, b) => a + b, 0) / values.length; break;
            case 'min': value = Math.min(...values); break;
            case 'max': value = Math.max(...values); break;
            default: value = values.length;
        }
    }
    
    container.innerHTML = `
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-chart-line text-primary"></i>
            </div>
            <div>
                <div class="text-2xl font-bold text-foreground leading-none">${typeof value === 'number' ? value.toLocaleString('pt-BR') : value}</div>
                <div class="text-xs text-muted-foreground mt-1">${config.title}</div>
            </div>
        </div>
    `;
}

async function refreshData() {
    const icon = document.getElementById('refreshIcon');
    icon.classList.add('animate-spin');
    
    Object.values(chartInstances).forEach(chart => chart.destroy());
    chartInstances = {};
    
    await loadData();
    renderDashboard();
    
    icon.classList.remove('animate-spin');
}
</script>
{% endblock %}
