<header class="border-b bg-card shadow-sm">
  <div class="container mx-auto px-4">
    <div class="flex flex-col gap-4 py-4 lg:flex-row lg:items-center lg:justify-between">
      <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:gap-4">
        <div class="flex items-center gap-2">
          <img src="{{ url_for('static', filename='portoex-logo.png') }}" alt="PortoEx" class="h-8 w-auto">
          <span class="text-xl font-bold text-primary border-l border-muted-foreground/30 pl-2 ml-2">GeRot</span>
        </div>

        <nav class="flex flex-nowrap gap-2 overflow-x-auto no-scrollbar py-1">
          <a href="{{ url_for('index') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-home mr-2"></i>Início
          </a>
          <a href="{{ url_for('team_dashboard') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-chart-bar mr-2"></i>Dashboards
          </a>
          <a href="{{ url_for('cd_booking') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-calendar mr-2"></i>Agenda CD
          </a>
          <a href="{{ url_for('agent_page') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-layer-group mr-2"></i>Biblioteca
          </a>
          {% if session.role == 'admin' %}
          <a href="{{ url_for('agent_lab_page') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-flask mr-2"></i>Laboratório
          </a>
          {% endif %}
          {% if session.role == 'admin' %}
          <a href="{{ url_for('admin_dashboard') }}"
             class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors whitespace-nowrap">
            <i class="fas fa-cog mr-2"></i>Admin
          </a>
          {% endif %}
        </nav>
      </div>

      <div class="flex flex-wrap items-center gap-3 text-sm text-muted-foreground">
        {% if session.user_id %}
          <span>Olá, {{ session.nome_completo }}</span>
          <div class="flex items-center gap-2">
            <a href="{{ url_for('profile') }}"
               class="rounded-md px-3 py-2 text-sm font-medium text-foreground hover:bg-accent hover:text-accent-foreground transition-colors">
              <i class="fas fa-user-circle"></i>
            </a>
            <a href="{{ url_for('logout') }}"
               class="rounded-md bg-destructive px-3 py-2 text-sm font-medium text-white hover:bg-destructive/90 transition-colors">
              <i class="fas fa-sign-out-alt mr-2"></i>Sair
            </a>
          </div>
        {% endif %}
      </div>
    </div>
  </div>
</header>
