<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Integração - API TMS</title>
    <script src="api-client.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            background: #ffe6e6;
            color: #c00;
        }
        .success {
            background: #e6ffe6;
            color: #060;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Integração - API TMS VCI TRANSPORTES</h1>

    <!-- Login -->
    <div class="section">
        <h2>1. Autenticação</h2>
        <input type="email" id="email" placeholder="Email" value="admin@vcitransportes.com.br">
        <input type="password" id="password" placeholder="Senha" value="admin123">
        <button onclick="fazerLogin()">Login</button>
        <button onclick="obterPerfil()">Obter Perfil</button>
        <button onclick="fazerLogout()">Logout</button>
        <div id="auth-result" class="result"></div>
    </div>

    <!-- Clientes -->
    <div class="section">
        <h2>2. Clientes</h2>
        <button onclick="listarClientes()">Listar Clientes</button>
        <button onclick="criarCliente()">Criar Cliente</button>
        <div id="client-result" class="result"></div>
    </div>

    <!-- Cotações -->
    <div class="section">
        <h2>3. Cotações</h2>
        <button onclick="listarCotacoes()">Listar Cotações</button>
        <button onclick="criarCotacao()">Criar Cotação</button>
        <div id="quote-result" class="result"></div>
    </div>

    <!-- CT-e -->
    <div class="section">
        <h2>4. CT-e</h2>
        <input type="text" id="quote-id" placeholder="ID da Cotação">
        <button onclick="emitirCte()">Emitir CT-e</button>
        <button onclick="listarCtes()">Listar CT-es</button>
        <div id="cte-result" class="result"></div>
    </div>

    <!-- MDF-e -->
    <div class="section">
        <h2>5. MDF-e</h2>
        <input type="text" id="cte-ids" placeholder="IDs dos CT-es (separados por vírgula)">
        <button onclick="emitirMdfe()">Emitir MDF-e</button>
        <button onclick="listarMdfes()">Listar MDF-es</button>
        <div id="mdfe-result" class="result"></div>
    </div>

    <!-- Boletos -->
    <div class="section">
        <h2>6. Boletos</h2>
        <button onclick="listarBoletos()">Listar Boletos</button>
        <div id="boleto-result" class="result"></div>
    </div>

    <script>
        // Configurar URL da API (ajuste conforme necessário)
        window.API_BASE_URL = 'http://localhost:3000/api';

        // Funções de exemplo

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('auth-result');
            
            try {
                resultDiv.textContent = 'Fazendo login...';
                const data = await api.login(email, password);
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function obterPerfil() {
            const resultDiv = document.getElementById('auth-result');
            
            try {
                resultDiv.textContent = 'Buscando perfil...';
                const data = await api.getProfile();
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function fazerLogout() {
            try {
                await api.logout();
                document.getElementById('auth-result').textContent = 'Logout realizado com sucesso!';
            } catch (error) {
                document.getElementById('auth-result').textContent = 'Erro: ' + error.message;
            }
        }

        async function listarClientes() {
            const resultDiv = document.getElementById('client-result');
            
            try {
                resultDiv.textContent = 'Buscando clientes...';
                const data = await api.getClients({ page: 1, limit: 10 });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function criarCliente() {
            const resultDiv = document.getElementById('client-result');
            
            try {
                resultDiv.textContent = 'Criando cliente...';
                const data = await api.createClient({
                    cnpj: '98765432000111',
                    razaoSocial: 'CLIENTE EXEMPLO LTDA',
                    nomeFantasia: 'Cliente Exemplo',
                    emailFaturamento: 'fatura@exemplo.com.br',
                    telefone: '11999999999',
                    cidade: 'São Paulo',
                    estado: 'SP'
                });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function listarCotacoes() {
            const resultDiv = document.getElementById('quote-result');
            
            try {
                resultDiv.textContent = 'Buscando cotações...';
                const data = await api.getQuotes({ page: 1, limit: 10 });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function criarCotacao() {
            const resultDiv = document.getElementById('quote-result');
            
            try {
                // Primeiro, buscar um cliente
                const clients = await api.getClients();
                if (!clients.clients || clients.clients.length === 0) {
                    throw new Error('Nenhum cliente cadastrado. Crie um cliente primeiro.');
                }
                
                const clientId = clients.clients[0].id;
                
                resultDiv.textContent = 'Criando cotação...';
                const data = await api.createQuote({
                    clientId: clientId,
                    origem: 'São Paulo - SP',
                    destino: 'Rio de Janeiro - RJ',
                    peso: 1000,
                    cubagem: 5.5,
                    valor: 1500.00,
                    observacoes: 'Cotação de exemplo'
                });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function emitirCte() {
            const resultDiv = document.getElementById('cte-result');
            const quoteId = document.getElementById('quote-id').value;
            
            if (!quoteId) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Informe o ID da cotação';
                return;
            }
            
            try {
                resultDiv.textContent = 'Emitindo CT-e...';
                const data = await api.emitirCte({
                    quoteId: quoteId,
                    numeroCte: Date.now().toString().slice(-8)
                });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function listarCtes() {
            const resultDiv = document.getElementById('cte-result');
            
            try {
                resultDiv.textContent = 'Buscando CT-es...';
                const data = await api.getCtes({ page: 1, limit: 10 });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function emitirMdfe() {
            const resultDiv = document.getElementById('mdfe-result');
            const cteIdsInput = document.getElementById('cte-ids').value;
            
            if (!cteIdsInput) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Informe os IDs dos CT-es (separados por vírgula)';
                return;
            }
            
            const cteIds = cteIdsInput.split(',').map(id => id.trim());
            
            try {
                resultDiv.textContent = 'Emitindo MDF-e...';
                const data = await api.emitirMdfe({
                    cteIds: cteIds,
                    numeroMdfe: Date.now().toString().slice(-8)
                });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function listarMdfes() {
            const resultDiv = document.getElementById('mdfe-result');
            
            try {
                resultDiv.textContent = 'Buscando MDF-es...';
                const data = await api.getMdfes({ page: 1, limit: 10 });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }

        async function listarBoletos() {
            const resultDiv = document.getElementById('boleto-result');
            
            try {
                resultDiv.textContent = 'Buscando boletos...';
                const data = await api.getBoletos({ page: 1, limit: 10 });
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Erro: ' + error.message;
            }
        }
    </script>
</body>
</html>
